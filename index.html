<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conlang Root Generator</title>
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Conlang Gen">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f5f2eb">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <style>
        :root {
            --bg: #f5f2eb;
            --panel-bg: #fffdf7;
            --border: #d6cdb5;
            --accent: #8b6f47;
            --accent2: #b68b5c;
            --text: #3a3226;
            --light-text: #6b5e4f;
            --held-border: #5e8b5c;
            --held-bg: #eaf4e8;
            --btn: #8b6f47;
            --btn-hover: #6f5837;
            --danger: #b0453a;
            --danger-hover: #8b342a;
            --tab-height: 44px;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border);
            padding: 0.6rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.4rem;
            flex-shrink: 0;
        }
        header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--accent);
        }
        .header-buttons {
            display: flex;
            gap: 0.4rem;
        }
        button {
            background: var(--btn);
            color: white;
            border: none;
            padding: 0.4rem 0.7rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }
        button:hover {
            background: var(--btn-hover);
        }
        button.secondary {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--border);
        }
        button.secondary:hover {
            background: #f0ebe0;
        }
        button.danger {
            background: var(--danger);
        }
        button.danger:hover {
            background: var(--danger-hover);
        }
        button:active {
            opacity: 0.8;
        }

        /* Tab Navigation - hidden on desktop */
        .tab-nav {
            display: none;
            flex-shrink: 0;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border);
        }
        .tab-nav button {
            flex: 1;
            background: transparent;
            color: var(--light-text);
            border: none;
            border-bottom: 3px solid transparent;
            border-radius: 0;
            padding: 0.7rem 0.5rem;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .tab-nav button.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            font-weight: 700;
        }

        /* Main content area */
        main {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 1px;
            background: var(--border);
        }
        .panel {
            background: var(--panel-bg);
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        #phonologyPanel {
            flex: 0 0 270px;
        }
        #generatorPanel {
            flex: 0 0 320px;
        }
        #lexiconPanel {
            flex: 1;
            min-width: 280px;
        }
        .panel h2 {
            font-size: 1rem;
            color: var(--accent);
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.3rem;
            margin-bottom: 0;
            flex-shrink: 0;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }
        .field label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--light-text);
        }
        input[type="text"],
        input[type="number"],
        textarea {
            padding: 0.4rem 0.5rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.9rem;
            background: white;
            -webkit-appearance: none;
        }
        textarea {
            resize: vertical;
            min-height: 50px;
        }
        input[type="range"] {
            -webkit-appearance: none;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }
        .category-item {
            background: #faf8f3;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.4rem;
            margin-bottom: 0.4rem;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        .category-header {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .category-header input {
            width: 36px;
            text-align: center;
            font-weight: bold;
            padding: 0.2rem;
        }
        .category-header .delete-cat {
            margin-left: auto;
            font-size: 0.75rem;
            padding: 0.2rem 0.4rem;
        }
        .slider-value {
            font-size: 0.8rem;
            color: var(--accent);
            margin-left: 0.3rem;
        }
        .generator-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            align-items: center;
        }
        .candidate-list {
            flex: 1;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.4rem;
            background: #fefef9;
            min-height: 80px;
        }
        .candidate-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.25rem 0.3rem;
            border-radius: 4px;
            margin-bottom: 0.15rem;
            font-size: 0.95rem;
            transition: background 0.15s;
        }
        .candidate-item.held {
            background: var(--held-bg);
            border: 1px solid var(--held-border);
            font-weight: 600;
        }
        .candidate-item .word {
            flex: 1;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.05em;
            font-size: 1rem;
        }
        .candidate-item input[type="checkbox"] {
            transform: scale(1.3);
            cursor: pointer;
            -webkit-appearance: checkbox;
        }
        .lexicon-search {
            display: flex;
            gap: 0.4rem;
            align-items: center;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .tag-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
            margin: 0.2rem 0;
            flex-shrink: 0;
        }
        .tag-chip {
            background: #ede4d3;
            border: 1px solid #cfbe9e;
            border-radius: 12px;
            padding: 0.12rem 0.5rem;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .tag-chip.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .lexicon-table-wrapper {
            flex: 1;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 6px;
        }
        .lexicon-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .lexicon-table th {
            text-align: left;
            background: #f2ede3;
            padding: 0.35rem 0.4rem;
            border-bottom: 2px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1;
            font-size: 0.8rem;
        }
        .lexicon-table td {
            padding: 0.25rem 0.4rem;
            border-bottom: 1px solid #e8e0d2;
            vertical-align: top;
        }
        .lexicon-table tr:hover {
            background: #fdfaf3;
        }
        .lexicon-table .actions {
            display: flex;
            gap: 0.2rem;
        }
        .lexicon-table .actions button {
            padding: 0.18rem 0.4rem;
            font-size: 0.75rem;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal {
            background: white;
            padding: 1.2rem;
            border-radius: 10px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal h3 {
            margin: 0;
            color: var(--accent);
            font-size: 1.1rem;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 0.4rem;
            margin-top: 0.3rem;
        }
        .empty-message {
            color: #aaa;
            font-style: italic;
            padding: 1.5rem;
            text-align: center;
            font-size: 0.9rem;
        }

        /* Mobile: Tab-based layout */
        @media (max-width: 768px) {
            header {
                padding: 0.4rem 0.8rem;
            }
            header h1 {
                font-size: 1rem;
            }
            .header-buttons button {
                font-size: 0.8rem;
                padding: 0.35rem 0.5rem;
            }
            .tab-nav {
                display: flex;
            }
            main {
                flex-direction: column;
                position: relative;
            }
            .panel {
                display: none;
                flex: 1;
                width: 100%;
                padding: 0.8rem;
                overflow-y: auto;
            }
            .panel.active {
                display: flex;
            }
            #phonologyPanel, #generatorPanel, #lexiconPanel {
                flex: 1;
                min-width: unset;
            }
            .candidate-item {
                padding: 0.3rem 0.3rem;
            }
            .candidate-item .word {
                font-size: 1.05rem;
            }
            .lexicon-table {
                font-size: 0.8rem;
            }
            .lexicon-table th, .lexicon-table td {
                padding: 0.3rem 0.3rem;
            }
            button {
                padding: 0.45rem 0.6rem;
                font-size: 0.85rem;
            }
        }
        @media (max-width: 400px) {
            .lexicon-table th:nth-child(4),
            .lexicon-table td:nth-child(4) {
                display: none;
            }
            .candidate-item .add-candidate-btn {
                font-size: 0.7rem;
                padding: 0.25rem 0.4rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🌿 Conlang Gen</h1>
        <div class="header-buttons">
            <button id="importBtn" class="secondary">📂 Import</button>
            <button id="exportBtn" class="secondary">💾 Export</button>
        </div>
    </header>

    <!-- Mobile Tab Navigation -->
    <nav class="tab-nav" id="tabNav">
        <button class="active" data-panel="phonologyPanel">🎛️ Rules</button>
        <button data-panel="generatorPanel">⚡ Generate</button>
        <button data-panel="lexiconPanel">📚 Lexicon</button>
    </nav>

    <main>
        <!-- Phonology Panel -->
        <section id="phonologyPanel" class="panel active">
            <h2>🎛️ Phonology</h2>
            <div class="field">
                <label>Categories (single letter)</label>
                <div id="categoriesContainer"></div>
                <button id="addCategoryBtn" class="secondary" style="align-self:flex-start;">+ Add Category</button>
            </div>
            <div class="field">
                <label for="templateInput">Syllable Template</label>
                <input type="text" id="templateInput" value="(C)V(C)" placeholder="e.g. (C)V(C)">
                <span style="font-size:0.7rem;color:var(--light-text);">Single-letter categories. Parentheses = optional.</span>
            </div>
            <div class="field">
                <label>Optional Probability <span id="optProbDisplay" class="slider-value">0.50</span></label>
                <input type="range" id="optProbSlider" min="0" max="1" step="0.05" value="0.5">
            </div>
            <div class="field">
                <label for="maxSyllablesInput">Max Syllables</label>
                <input type="number" id="maxSyllablesInput" value="2" min="1" max="6" step="1">
            </div>
            <div class="field">
                <label for="separatorInput">Syllable Separator</label>
                <input type="text" id="separatorInput" value="" placeholder="e.g. -">
            </div>
        </section>

        <!-- Generator Panel -->
        <section id="generatorPanel" class="panel">
            <h2>⚡ Generator</h2>
            <div class="generator-controls">
                <div class="field" style="flex-direction:row;align-items:center;gap:0.3rem;">
                    <label for="batchSizeInput" style="white-space:nowrap;">Batch:</label>
                    <input type="number" id="batchSizeInput" value="10" min="1" max="100" style="width:55px;">
                </div>
                <label style="display:flex;align-items:center;gap:0.3rem;font-size:0.8rem;">
                    <input type="checkbox" id="avoidDupCheckbox" checked> No duplicates
                </label>
            </div>
            <div style="display:flex;gap:0.4rem;flex-wrap:wrap;">
                <button id="generateNewBtn">🎲 New Batch</button>
                <button id="rerollUnheldBtn" class="secondary" disabled>🔄 Re-roll</button>
                <button id="clearHoldsBtn" class="secondary" style="font-size:0.75rem;">✕ Clear</button>
            </div>
            <div class="candidate-list" id="candidateList">
                <div class="empty-message">Press "New Batch" to generate roots</div>
            </div>
        </section>

        <!-- Lexicon Panel -->
        <section id="lexiconPanel" class="panel">
            <h2>📚 Lexicon</h2>
            <div class="lexicon-search">
                <input type="text" id="lexiconSearch" placeholder="Search..." style="flex:1;">
                <button id="addWordBtn">➕ Add</button>
            </div>
            <div class="tag-chips" id="tagChipsContainer"></div>
            <div class="lexicon-table-wrapper">
                <table class="lexicon-table" id="lexiconTable">
                    <thead>
                        <tr>
                            <th>Word</th>
                            <th>Tags</th>
                            <th>Meaning</th>
                            <th>Notes</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="lexiconBody"></tbody>
                </table>
                <div id="lexiconEmpty" class="empty-message" style="display:none;">No entries yet. Add words from generator or manually.</div>
            </div>
        </section>
    </main>

    <!-- Modal -->
    <div id="wordModal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <h3 id="modalTitle">Add Word</h3>
            <div class="field">
                <label>Word</label>
                <input type="text" id="modalWord" placeholder="conlang root">
            </div>
            <div class="field">
                <label>Tags (comma separated)</label>
                <input type="text" id="modalTags" placeholder="noun, body part">
            </div>
            <div class="field">
                <label>Meaning (English)</label>
                <input type="text" id="modalMeaning" placeholder="hand">
            </div>
            <div class="field">
                <label>Notes</label>
                <textarea id="modalNotes" rows="2" placeholder="etymology, usage..."></textarea>
            </div>
            <div class="modal-buttons">
                <button id="modalCancel" class="secondary">Cancel</button>
                <button id="modalSave">Save</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const state = {
                categories: {
                    'C': ['p', 't', 'k', 'b', 'd', 'g', 'm', 'n', 'ŋ'],
                    'V': ['a', 'e', 'i', 'o', 'u'],
                    'F': ['f', 's', 'x', 'h'],
                    'N': ['m', 'n', 'ŋ'],
                    'L': ['l', 'r', 'w', 'j']
                },
                template: '(C)V(C)',
                optionalProbability: 0.5,
                maxSyllables: 2,
                syllableSeparator: '',
                lexicon: [
                    { id: 1, word: 'toka', tags: ['noun', 'body part'], meaning: 'hand', notes: '' },
                    { id: 2, word: 'mira', tags: ['verb'], meaning: 'to see', notes: 'basic perception' }
                ],
                nextId: 3,
                heldWords: [],
                currentBatch: [],
                activeTagFilter: null,
                searchQuery: ''
            };

            function saveState() {
                localStorage.setItem('conlangToolState', JSON.stringify({
                    categories: state.categories,
                    template: state.template,
                    optionalProbability: state.optionalProbability,
                    maxSyllables: state.maxSyllables,
                    syllableSeparator: state.syllableSeparator,
                    lexicon: state.lexicon,
                    nextId: state.nextId
                }));
            }

            function loadState() {
                const saved = localStorage.getItem('conlangToolState');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        state.categories = data.categories || state.categories;
                        state.template = data.template || '(C)V(C)';
                        state.optionalProbability = data.optionalProbability ?? 0.5;
                        state.maxSyllables = data.maxSyllables || 2;
                        state.syllableSeparator = data.syllableSeparator || '';
                        state.lexicon = data.lexicon || [];
                        state.nextId = data.nextId || 1;
                    } catch (e) { console.warn('Could not parse saved state.'); }
                }
            }

            function renderCategories() {
                const container = document.getElementById('categoriesContainer');
                container.innerHTML = '';
                Object.entries(state.categories).forEach(([name, symbols]) => {
                    const div = document.createElement('div');
                    div.className = 'category-item';
                    div.innerHTML = `
                        <div class="category-header">
                            <input type="text" class="cat-name" value="${escapeHtml(name)}" maxlength="1">
                            <span style="font-size:0.75rem;color:var(--light-text);">symbols:</span>
                            <button class="delete-cat danger">🗑</button>
                        </div>
                        <textarea class="cat-symbols" rows="2" placeholder="one per line">${symbols.join('\n')}</textarea>
                    `;
                    const nameInput = div.querySelector('.cat-name');
                    const symTextarea = div.querySelector('.cat-symbols');
                    nameInput.addEventListener('input', () => {
                        const newName = nameInput.value.trim();
                        if (newName && newName !== name) {
                            if (state.categories[newName]) { nameInput.value = name; return; }
                            delete state.categories[name];
                            state.categories[newName] = symbols;
                            renderCategories();
                            saveState();
                        }
                    });
                    symTextarea.addEventListener('input', () => {
                        state.categories[name] = symTextarea.value.split(/[\n,]+/).map(s => s.trim()).filter(s => s.length > 0);
                        saveState();
                    });
                    div.querySelector('.delete-cat').addEventListener('click', () => {
                        if (Object.keys(state.categories).length <= 1) return;
                        delete state.categories[name];
                        renderCategories();
                        saveState();
                    });
                    container.appendChild(div);
                });
            }

            document.getElementById('addCategoryBtn').addEventListener('click', () => {
                const newName = prompt('Enter a single letter for the new category:');
                if (!newName || newName.length !== 1) return;
                if (state.categories[newName]) { alert('Category already exists.'); return; }
                state.categories[newName] = [];
                renderCategories();
                saveState();
            });

            function parseTemplate(templateStr) {
                const tokens = [];
                let i = 0;
                while (i < templateStr.length) {
                    const ch = templateStr[i];
                    if (ch === '(') {
                        const end = templateStr.indexOf(')', i);
                        if (end === -1) throw new Error('Unmatched parenthesis.');
                        const inside = templateStr.slice(i+1, end);
                        tokens.push({ type: 'optional', sequence: inside.split('').filter(c => c.trim() !== '') });
                        i = end + 1;
                    } else if (ch === ')') {
                        throw new Error('Unexpected closing parenthesis.');
                    } else if (ch.trim() === '') {
                        i++;
                    } else {
                        tokens.push({ type: 'required', sequence: [ch] });
                        i++;
                    }
                }
                return tokens;
            }

            function generateSyllable(tokens, categories, prob) {
                let result = '';
                for (const token of tokens) {
                    if (token.type === 'required') {
                        for (const cat of token.sequence) {
                            const syms = categories[cat];
                            if (!syms || syms.length === 0) throw new Error(`Category "${cat}" empty.`);
                            result += syms[Math.floor(Math.random() * syms.length)];
                        }
                    } else {
                        if (Math.random() < prob) {
                            for (const cat of token.sequence) {
                                const syms = categories[cat];
                                if (!syms || syms.length === 0) throw new Error(`Category "${cat}" empty.`);
                                result += syms[Math.floor(Math.random() * syms.length)];
                            }
                        }
                    }
                }
                return result;
            }

            function generateWord(tokens, categories, prob, maxSyll, separator) {
                const numSyll = Math.floor(Math.random() * maxSyll) + 1;
                const syllables = [];
                for (let s = 0; s < numSyll; s++) {
                    syllables.push(generateSyllable(tokens, categories, prob));
                }
                return syllables.join(separator);
            }

            function getLexiconWordSet() {
                return new Set(state.lexicon.map(e => e.word));
            }

            function generateUniqueBatch(size, avoidDup, heldWords, maxAttempts = 1000) {
                const tokens = parseTemplate(state.template);
                const prob = state.optionalProbability;
                const maxSyll = state.maxSyllables;
                const sep = state.syllableSeparator;
                const lexiconSet = avoidDup ? getLexiconWordSet() : new Set();
                const heldSet = new Set(heldWords);
                const result = [...heldWords];
                const used = new Set([...heldSet, ...lexiconSet]);
                let attempts = 0;
                while (result.length < size && attempts < maxAttempts) {
                    const word = generateWord(tokens, state.categories, prob, maxSyll, sep);
                    if (!used.has(word)) {
                        result.push(word);
                        used.add(word);
                    }
                    attempts++;
                }
                if (result.length < size) {
                    alert(`Only ${result.length} unique words after ${maxAttempts} tries. Expand categories or relax constraints.`);
                }
                return result;
            }

            function renderGenerator() {
                const listDiv = document.getElementById('candidateList');
                listDiv.innerHTML = '';
                if (state.currentBatch.length === 0) {
                    listDiv.innerHTML = '<div class="empty-message">Press "New Batch" to generate roots</div>';
                } else {
                    state.currentBatch.forEach(word => {
                        const held = state.heldWords.includes(word);
                        const item = document.createElement('div');
                        item.className = `candidate-item ${held ? 'held' : ''}`;
                        item.innerHTML = `
                            <input type="checkbox" class="hold-checkbox" ${held ? 'checked' : ''}>
                            <span class="word">${escapeHtml(word)}</span>
                            <button class="add-candidate-btn secondary" style="font-size:0.75rem;">➕</button>
                        `;
                        item.querySelector('.hold-checkbox').addEventListener('change', (e) => {
                            if (e.target.checked) {
                                if (!state.heldWords.includes(word)) state.heldWords.push(word);
                            } else {
                                state.heldWords = state.heldWords.filter(w => w !== word);
                            }
                            renderGenerator();
                            updateRerollBtn();
                        });
                        item.querySelector('.add-candidate-btn').addEventListener('click', () => openModalForWord(word));
                        listDiv.appendChild(item);
                    });
                }
                updateRerollBtn();
            }

            function updateRerollBtn() {
                document.getElementById('rerollUnheldBtn').disabled = state.heldWords.length === 0;
            }

            function generateNewBatch() {
                const size = parseInt(document.getElementById('batchSizeInput').value, 10) || 10;
                const avoidDup = document.getElementById('avoidDupCheckbox').checked;
                state.heldWords = [];
                state.currentBatch = generateUniqueBatch(size, avoidDup, []);
                renderGenerator();
            }

            function rerollUnheld() {
                const size = parseInt(document.getElementById('batchSizeInput').value, 10) || 10;
                const avoidDup = document.getElementById('avoidDupCheckbox').checked;
                state.currentBatch = generateUniqueBatch(size, avoidDup, [...state.heldWords]);
                renderGenerator();
            }

            function getFilteredLexicon() {
                let entries = [...state.lexicon];
                if (state.activeTagFilter) entries = entries.filter(e => e.tags.includes(state.activeTagFilter));
                if (state.searchQuery) {
                    const q = state.searchQuery.toLowerCase();
                    entries = entries.filter(e => e.word.toLowerCase().includes(q) || e.meaning.toLowerCase().includes(q) || (e.notes && e.notes.toLowerCase().includes(q)));
                }
                return entries;
            }

            function renderLexicon() {
                const tbody = document.getElementById('lexiconBody');
                const emptyMsg = document.getElementById('lexiconEmpty');
                const entries = getFilteredLexicon();
                tbody.innerHTML = '';
                if (entries.length === 0) {
                    emptyMsg.style.display = 'block';
                } else {
                    emptyMsg.style.display = 'none';
                    entries.forEach(entry => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td><strong>${escapeHtml(entry.word)}</strong></td>
                            <td>${entry.tags.map(t => `<span class="tag-chip" style="cursor:pointer;">${escapeHtml(t)}</span>`).join(' ')}</td>
                            <td>${escapeHtml(entry.meaning)}</td>
                            <td style="font-size:0.75rem;color:var(--light-text);">${escapeHtml(entry.notes || '')}</td>
                            <td class="actions">
                                <button class="edit-entry-btn secondary">✏️</button>
                                <button class="delete-entry-btn danger">🗑</button>
                            </td>
                        `;
                        tr.querySelector('.edit-entry-btn').addEventListener('click', () => openModalForEdit(entry));
                        tr.querySelector('.delete-entry-btn').addEventListener('click', () => {
                            if (confirm(`Delete "${entry.word}"?`)) {
                                state.lexicon = state.lexicon.filter(e => e.id !== entry.id);
                                saveState();
                                renderLexicon();
                                renderTagChips();
                            }
                        });
                        tbody.appendChild(tr);
                    });
                }
                renderTagChips();
            }

            function renderTagChips() {
                const container = document.getElementById('tagChipsContainer');
                const allTags = new Set();
                state.lexicon.forEach(e => e.tags.forEach(t => allTags.add(t)));
                const tags = Array.from(allTags).sort();
                container.innerHTML = tags.map(t => {
                    const active = state.activeTagFilter === t ? 'active' : '';
                    return `<span class="tag-chip ${active}" data-tag="${escapeHtml(t)}">${escapeHtml(t)}</span>`;
                }).join('');
                container.querySelectorAll('.tag-chip').forEach(chip => {
                    chip.addEventListener('click', () => {
                        const tag = chip.dataset.tag;
                        state.activeTagFilter = state.activeTagFilter === tag ? null : tag;
                        renderLexicon();
                    });
                });
                if (tags.length === 0) container.innerHTML = '<span style="font-size:0.75rem;color:var(--light-text);">No tags yet</span>';
            }

            let modalCallback = null;
            const modal = document.getElementById('wordModal');
            document.getElementById('modalCancel').addEventListener('click', () => { modal.style.display = 'none'; modalCallback = null; });
            document.getElementById('modalSave').addEventListener('click', () => {
                const word = document.getElementById('modalWord').value.trim();
                if (!word) { alert('Word cannot be empty.'); return; }
                const tags = document.getElementById('modalTags').value.trim().split(',').map(s => s.trim()).filter(s => s.length > 0);
                const meaning = document.getElementById('modalMeaning').value.trim();
                const notes = document.getElementById('modalNotes').value.trim();
                if (modalCallback) modalCallback({ word, tags, meaning, notes });
                modal.style.display = 'none';
                modalCallback = null;
            });

            function openModalForWord(word) {
                document.getElementById('modalTitle').textContent = 'Add Word';
                document.getElementById('modalWord').value = word;
                document.getElementById('modalTags').value = '';
                document.getElementById('modalMeaning').value = '';
                document.getElementById('modalNotes').value = '';
                modalCallback = (data) => {
                    if (state.lexicon.some(e => e.word === data.word) && !confirm(`"${data.word}" already exists. Add anyway?`)) return;
                    state.lexicon.push({ id: state.nextId++, ...data });
                    saveState();
                    renderLexicon();
                    renderTagChips();
                    state.currentBatch = state.currentBatch.filter(w => w !== data.word);
                    state.heldWords = state.heldWords.filter(w => w !== data.word);
                    renderGenerator();
                };
                modal.style.display = 'flex';
                document.getElementById('modalWord').focus();
            }

            function openModalForEdit(entry) {
                document.getElementById('modalTitle').textContent = 'Edit Word';
                document.getElementById('modalWord').value = entry.word;
                document.getElementById('modalTags').value = entry.tags.join(', ');
                document.getElementById('modalMeaning').value = entry.meaning;
                document.getElementById('modalNotes').value = entry.notes || '';
                modalCallback = (data) => {
                    if (state.lexicon.some(e => e.word === data.word && e.id !== entry.id) && !confirm(`"${data.word}" already exists. Update anyway?`)) return;
                    Object.assign(entry, data);
                    saveState();
                    renderLexicon();
                    renderTagChips();
                };
                modal.style.display = 'flex';
                document.getElementById('modalWord').focus();
            }

            document.getElementById('addWordBtn').addEventListener('click', () => openModalForWord(''));
            document.getElementById('exportBtn').addEventListener('click', () => {
                const data = { categories: state.categories, template: state.template, optionalProbability: state.optionalProbability, maxSyllables: state.maxSyllables, syllableSeparator: state.syllableSeparator, lexicon: state.lexicon, nextId: state.nextId };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'conlang-project.json'; a.click();
                URL.revokeObjectURL(url);
            });
            document.getElementById('importBtn').addEventListener('click', () => {
                const input = document.createElement('input');
                input.type = 'file'; input.accept = '.json';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        try {
                            const data = JSON.parse(ev.target.result);
                            if (!data.categories || !data.template || !data.lexicon) throw new Error('Invalid file structure.');
                            Object.assign(state, {
                                categories: data.categories,
                                template: data.template,
                                optionalProbability: data.optionalProbability ?? 0.5,
                                maxSyllables: data.maxSyllables || 2,
                                syllableSeparator: data.syllableSeparator || '',
                                lexicon: data.lexicon,
                                nextId: data.nextId || 1,
                                heldWords: [], currentBatch: [], activeTagFilter: null, searchQuery: ''
                            });
                            document.getElementById('templateInput').value = state.template;
                            document.getElementById('optProbSlider').value = state.optionalProbability;
                            document.getElementById('optProbDisplay').textContent = state.optionalProbability.toFixed(2);
                            document.getElementById('maxSyllablesInput').value = state.maxSyllables;
                            document.getElementById('separatorInput').value = state.syllableSeparator;
                            document.getElementById('lexiconSearch').value = '';
                            saveState();
                            renderCategories();
                            renderGenerator();
                            renderLexicon();
                        } catch (err) { alert('Error: ' + err.message); }
                    };
                    reader.readAsText(file);
                };
                input.click();
            });

            // Tab navigation for mobile
            document.querySelectorAll('#tabNav button').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#tabNav button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.querySelectorAll('main .panel').forEach(p => p.classList.remove('active'));
                    const panelId = btn.dataset.panel;
                    document.getElementById(panelId).classList.add('active');
                });
            });

            document.getElementById('templateInput').addEventListener('input', (e) => { state.template = e.target.value.trim(); saveState(); });
            document.getElementById('optProbSlider').addEventListener('input', (e) => { state.optionalProbability = parseFloat(e.target.value); document.getElementById('optProbDisplay').textContent = state.optionalProbability.toFixed(2); saveState(); });
            document.getElementById('maxSyllablesInput').addEventListener('input', (e) => { state.maxSyllables = parseInt(e.target.value, 10) || 1; saveState(); });
            document.getElementById('separatorInput').addEventListener('input', (e) => { state.syllableSeparator = e.target.value; saveState(); });
            document.getElementById('generateNewBtn').addEventListener('click', generateNewBatch);
            document.getElementById('rerollUnheldBtn').addEventListener('click', rerollUnheld);
            document.getElementById('clearHoldsBtn').addEventListener('click', () => { state.heldWords = []; renderGenerator(); });
            document.getElementById('lexiconSearch').addEventListener('input', (e) => { state.searchQuery = e.target.value; renderLexicon(); });

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            loadState();
            document.getElementById('templateInput').value = state.template;
            document.getElementById('optProbSlider').value = state.optionalProbability;
            document.getElementById('optProbDisplay').textContent = state.optionalProbability.toFixed(2);
            document.getElementById('maxSyllablesInput').value = state.maxSyllables;
            document.getElementById('separatorInput').value = state.syllableSeparator;
            renderCategories();
            renderGenerator();
            renderLexicon();
            if (window.innerWidth > 768) {
                document.querySelectorAll('main .panel').forEach(p => p.classList.add('active'));
            }
            window.addEventListener('resize', () => {
                if (window.innerWidth > 768) {
                    document.querySelectorAll('main .panel').forEach(p => p.classList.add('active'));
                } else {
                    const activeTab = document.querySelector('#tabNav button.active');
                    if (activeTab) {
                        document.querySelectorAll('main .panel').forEach(p => p.classList.remove('active'));
                        document.getElementById(activeTab.dataset.panel).classList.add('active');
                    }
                }
            });
            saveState();
        })();
    </script>
</body>
</html>
